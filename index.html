<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('Back_Kelulusan.jpg');">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-500 transform">
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center text-white">
            <h1 class="text-2xl font-bold tracking-wide">SMPN Satu Atap Bunga Mekar</h1>
            <p class="text-sm opacity-80 mt-1">Sistem Informasi Kelulusan Siswa T.A 2025/2026</p>
        </div>

        <div id="loginPanel" class="p-6 space-y-4">
            <h2 class="text-xl font-semibold text-gray-800 text-center">Silakan Login</h2>
            <p class="text-xs text-gray-500 text-center -mt-2">Gunakan NISN dan Tanggal Lahir Anda</p>
            
            <div id="loginError" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg text-sm text-center">
                NISN atau Tanggal Lahir salah!
            </div>

            <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">NISN (Username)</label>
                    <input type="text" id="nisn" required placeholder="Contoh: 005432189" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir (Password)</label>
                    <input type="date" id="tgl_lahir" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800">
                    <p class="text-[10px] text-gray-400 mt-1">*Format: bulan/hari/tahun pada browser</p>
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition duration-300 shadow-md">
                    Periksa Hasil
                </button>
            </form>
        </div>

        <div id="resultPanel" class="hidden p-6 space-y-6">
            <div class="border-b border-gray-100 pb-4 text-center">
                <h2 class="text-lg font-bold text-gray-800">HASIL KELULUSAN SISWA</h2>
            </div>

            <div class="space-y-2 text-sm text-gray-700 bg-gray-50 p-4 rounded-xl">
                <div class="flex justify-between"><span class="font-medium text-gray-500">Nama:</span> <span id="resNama" class="font-semibold text-gray-900"></span></div>
                <div class="flex justify-between"><span class="font-medium text-gray-500">NISN:</span> <span id="resNisn" class="text-gray-900"></span></div>
                <div class="flex justify-between"><span class="font-medium text-gray-500">Tempat Lahir:</span> <span id="resTempat" class="text-gray-900"></span></div>
                <div class="flex justify-between"><span class="font-medium text-gray-500">Tanggal Lahir:</span> <span id="resTanggal" class="text-gray-900"></span></div>
            </div>

            <div id="statusBox" class="text-center p-6 rounded-xl border dynamic-status">
                <p class="text-sm font-medium uppercase tracking-wider mb-1">Siswa Dinyatakan</p>
                <h3 id="resStatus" class="text-3xl font-extrabold tracking-wide"></h3>
            </div>

            <button onclick="logout()" 
                class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 rounded-lg transition duration-300">
                Kembali / Keluar
            </button>
        </div>

    </div>
<script>
        // --- 1. DATA DUMMY (Hanya digunakan jika URL di bawah belum diisi) ---
        const dummyData = [
            { no: 1, nisn: "12345678", nama: "Budi Santoso", tempat_lahir: "Jakarta", tanggal_lahir: "2007-05-15", status: "LULUS" },
            { no: 2, nisn: "87654321", nama: "Siti Aminah", tempat_lahir: "Bandung", tanggal_lahir: "2008-11-20", status: "LULUS" },
            { no: 3, nisn: "11223344", nama: "Iwan Fals", tempat_lahir: "Surabaya", tanggal_lahir: "2007-01-01", status: "TIDAK LULUS" }
        ];

        // --- URL GOOGLE APPS SCRIPT ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsdhIK6ab7ZsrH9v_2grjAXhvkxN95AYnJ0a_mhPDzZls0ksshAMA3sIjzJ4tRkSnYMw/exec"; 

        async function handleLogin(event) {
            event.preventDefault();
            
            const inputNisn = document.getElementById('nisn').value.trim();
            const inputTgl = document.getElementById('tgl_lahir').value; // Format: YYYY-MM-DD
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            errorDiv.classList.add('hidden');
            loginBtn.innerText = "Memproses...";
            loginBtn.disabled = true;

            // JIKA URL BELUM DIISI, GUNAKAN DATA DUMMY
            if (GOOGLE_SCRIPT_URL === "" || GOOGLE_SCRIPT_URL.includes("URL_WEB_APP_ANDA")) {
                setTimeout(() => {
                    const siswa = dummyData.find(s => s.nisn === inputNisn && s.tanggal_lahir === inputTgl);
                    if (siswa) { showResult(siswa); } else { showError(); }
                }, 1000);
            } 
            // JIKA URL SUDAH ADA, LANGSUNG AMBIL DATA DARI GOOGLE SHEET (ONLINE)
            else {
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?nisn=${inputNisn}&tgl=${inputTgl}`);
                    const result = await response.json();

                    if (result.status === "success") {
                        showResult(result.data);
                    } else {
                        showError();
                    }
                } catch (error) {
                    console.error("Error:", error);
                    alert("Terjadi kesalahan koneksi ke server Google Sheet.");
                    loginBtn.innerText = "Periksa Hasil";
                    loginBtn.disabled = false;
                }
            }
        }

        function showResult(data) {
            document.getElementById('resNama').innerText = data.nama;
            document.getElementById('resNisn').innerText = data.nisn;
            document.getElementById('resTempat').innerText = data.tempat_lahir;
            document.getElementById('resTanggal').innerText = data.tanggal_lahir;

            const statusBox = document.getElementById('statusBox');
            const resStatus = document.getElementById('resStatus');

            if (data.status.toUpperCase() === "LULUS") {
                statusBox.className = "text-center p-6 rounded-xl border border-green-200 bg-green-50 text-green-700 font-bold text-xl";
                resStatus.innerText = "LULUS";
            } else {
                statusBox.className = "text-center p-6 rounded-xl border border-red-200 bg-red-50 text-red-700 font-bold text-xl";
                resStatus.innerText = "TIDAK LULUS";
            }

            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('resultPanel').classList.remove('hidden');
        }

        function showError() {
            const loginBtn = document.getElementById('loginBtn');
            document.getElementById('loginError').classList.remove('hidden');
            loginBtn.innerText = "Periksa Hasil";
            loginBtn.disabled = false;
        }

        function logout() {
            document.getElementById('loginForm').reset();
            document.getElementById('loginBtn').innerText = "Periksa Hasil";
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('resultPanel').classList.add('hidden');
        }
    </script>

</body>
</html>
